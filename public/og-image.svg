<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Kamil Matyjaszczyk — Software Developer</title>
  <desc id="desc">Social preview image for Kamil Matyjaszczyk's software developer portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1200" y1="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a2018"/>
      <stop offset=".48" stop-color="#1f4930"/>
      <stop offset="1" stop-color="#061611"/>
    </linearGradient>
    <radialGradient id="sun" cx="0" cy="0" r="1" gradientTransform="matrix(360 0 0 360 800 112)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0d986" stop-opacity=".42"/>
      <stop offset=".62" stop-color="#c7b668" stop-opacity=".14"/>
      <stop offset="1" stop-color="#c7b668" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="176" x2="1030" y1="108" y2="542" gradientUnits="userSpaceOnUse">
      <stop stop-color="#173a29" stop-opacity=".96"/>
      <stop offset="1" stop-color="#081c15" stop-opacity=".93"/>
    </linearGradient>
    <linearGradient id="accent" x1="268" x2="944" y1="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f2e8ae"/>
      <stop offset=".52" stop-color="#cdb662"/>
      <stop offset="1" stop-color="#8fc07d"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="130%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#020b08" flood-opacity=".52"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#sun)"/>

  <g opacity=".3" fill="#071811">
    <ellipse cx="110" cy="70" rx="172" ry="96"/>
    <ellipse cx="316" cy="36" rx="168" ry="92"/>
    <ellipse cx="932" cy="58" rx="194" ry="102"/>
    <ellipse cx="1114" cy="92" rx="156" ry="86"/>
  </g>

  <g opacity=".24" fill="none" stroke-linecap="round">
    <path d="M94-18c-8 92 16 168 74 230" stroke="#f2e8ae" stroke-width="5"/>
    <path d="M1018-20c12 110-18 188-92 252" stroke="#d4bd66" stroke-width="5"/>
    <path d="M1094-18c24 126-18 216-126 284" stroke="#f2f0d5" stroke-width="3"/>
  </g>

  <rect x="96" y="86" width="1008" height="458" rx="42" fill="url(#card)" stroke="#f2e8ae" stroke-opacity=".16" filter="url(#shadow)"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="600" y="168" fill="#d2bc65" font-size="25" font-weight="700" text-anchor="middle" letter-spacing="8">PORTFOLIO / 2026</text>
    <text x="600" y="286" fill="#f5f1d6" font-size="82" font-weight="700" text-anchor="middle">Kamil Matyjaszczyk</text>
    <text x="600" y="360" fill="url(#accent)" font-size="48" font-weight="700" text-anchor="middle">Software Developer</text>
    <text x="600" y="430" fill="#d9dbc0" fill-opacity=".78" font-size="27" font-weight="500" text-anchor="middle">Løsninger som er enkle å forstå, bruke og videreutvikle</text>
  </g>

  <path d="M0 568c74-38 150-48 228-32 96 19 185 14 267-14 104-35 218-24 343 31 122 54 242 51 362-8v85H0Z" fill="#071812" opacity=".9"/>
  <path d="M0 596c150-37 286-34 408 9 128 45 263 34 403-31 108-50 238-44 389 18v38H0Z" fill="#04110d" opacity=".92"/>
